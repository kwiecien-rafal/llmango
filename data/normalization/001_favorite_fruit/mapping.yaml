# Deterministic normalization map: preprocessed answer -> canonical fruit.
#
# Keys are answers after preprocessing (Unicode NFKC, lowercased, articles and
# qualifiers stripped). Values are canonical categories from FruitEnum, or
# "other" for the tail. This layer is free, reproducible and reviewed in pull
# requests; the LLM layer only ever sees strings absent from this table and the
# cache.
#
# Conventions: tomato and avocado are kept as everyday-language categories
# rather than forced onto a botanical grouping. Culture-specific fruits keep
# their own canonical value instead of collapsing into a nearby Western fruit.

